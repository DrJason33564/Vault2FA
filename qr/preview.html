<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR Export</title>
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
  .page{max-width:92vw;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .qr-box{background:#fff;border:8px solid #fff;border-radius:8px;padding:0;line-height:0;}
  .qr-box img,.qr-box canvas{display:block;max-width:86vw;max-height:86vh;width:auto;height:auto;}
  .err{max-width:86vw;background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);border-radius:8px;padding:14px;font-size:13px;color:#ff7b72;text-align:center;display:none;line-height:1.5;}
  .err.show{display:block;}
</style>
</head>
<body>
<div class="page">
  <div class="qr-box" id="qrMount"></div>
  <div class="err" id="err"></div>
</div>
<script src="../locales/i18n.js"></script>
<script src="../third-party/qrcode.min.js"></script>
<script src="preview.js"></script>
</body>
</html>
